name: Check

permissions:
  contents: read

on:
  workflow_call:

jobs:
  main:
    strategy:
      matrix:
        texlive:
          - latest-full
          - TL2026-2026-03-01-full
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.com/islandoftex/images/texlive:${{ matrix.texlive }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install build dependencies
        run: apt-get update && apt-get install -y make curl zip unzip jq qpdf fonts-noto-cjk-extra
      - name: Configure git safe directory
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"
      - name: Build and package
        run: make github!
      - name: Verify PDF is not empty
        run: |
          pages=$(qpdf --show-npages ${{ vars.PACKAGE_NAME }}.pdf)
          echo "PDF has $pages pages"
          if [ "$pages" -eq 0 ]; then
            echo "Error: PDF is empty"
            exit 1
          fi
